<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pengelola - Alamanak</title>
  <link rel="icon" type="image/x-icon" href="/static/img/1000307868.png">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&family=Philosopher:ital,wght@0,400;0,700;1,400;1,700&family=Rajdhani:wght@300;400;500;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--datepicker-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/moment-hijri@2.1.2/moment-hijri.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" rel="stylesheet">
<!--datepicker-->
<style>
    html { background: #ccc; }
    body {
      max-width: 420px;
      min-height: 1000px;
      margin: 0 auto;
      background-image:url("/static/img/page-cover.png");
      background-position: center top;
    background-repeat: repeat;
    background-position: center bottom;
    background-repeat: repeat;
    background-size: auto;
    font-family: "Rajdhani", sans-serif;
    }
    @media (min-width: 768px) {
        body {
        max-width: 420px !important;
        margin: 0 auto;
      }
      .navbar {
        max-width: 420px !important;
        margin: 0 auto;
      }
      .offcanvas {
        max-width: 420px !important;
        margin: 0 auto;
      }
    }

.card{
      border: none !important;
}
.nm-glow-card {
    background: #ffffff;
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1), 0 0 20px rgba(0, 156, 72, 0.05);
    transition: transform 0.3s ease;
}

.nm-glow-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, #1b3a7c, #1d8757);
}
</style>
</head>
<body>

<nav class="navbar fixed-top navbar-expand-sm bg-body-tertiary">
  <div class="container-fluid d-flex justify-content-between">
    <a class="navbar-brand" href="#">
      <img src="/static/img/1000307868.png" alt="Logo" style="width:40px;" class="rounded-pill">
    </a>
    <button type="button" class="btn btn-light" data-bs-toggle="modal" data-bs-target="#ModalLogout">
        <img src="https://cdn-icons-png.flaticon.com/128/12437/12437671.png" alt="Logo" style="width:40px;" class="rounded-pill">
    </button>
  </div>
</nav>

<div class="container-fluid" style="padding-top: 85px;">
  {% block content %}{% endblock %}
</div>

<!-- Modal -->
<div class="modal fade" id="ModalLogout" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Konfirmasi</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        Apakah Anda yakin ingin mengakhiri sesi ini?
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <a href="{{ url_for('logout') }}" class="btn btn-primary">Ya, Keluar</a>
      </div>
    </div>
  </div>
</div>
<!--Modal-->
</body>
</html>
