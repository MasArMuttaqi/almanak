    {% block content %}{% endblock %}

<!--</div>-->

    <script  src="{{ url_for('static', filename='script.js') }}"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
  const items = document.querySelectorAll(".bottom-nav-menu li a");
  const indicator = document.getElementById("bottom-nav-indicator");

  function updateIndicator() {
    // 1. Cari item yang punya class 'active'
    const activeItem = document.querySelector(".bottom-nav-menu li a.active");

    if (activeItem) {
      // 2. Dapatkan index-nya
      const index = Array.from(items).indexOf(activeItem);

      // 3. Hitung Gap & Width secara dinamis (penting untuk kalkulasi translateX Anda)
      const firstRect = items[0].getBoundingClientRect();
      const secondRect = items[1].getBoundingClientRect();
      const gap = secondRect.left - firstRect.right;
      const itemWidth = firstRect.width;

      // 4. Update CSS Variables
      indicator.style.setProperty('--item', index);
      indicator.style.setProperty('--gap', `${gap}px`);
      indicator.style.setProperty('--item-width', `${itemWidth}px`);
    }
  }

  // Jalankan saat load
  updateIndicator();

  // Jalankan saat resize agar posisi tetap presisi
  window.addEventListener('resize', updateIndicator);

  // Logika Klik (Opsional jika Anda pindah halaman via URL/Href)
  items.forEach((item, index) => {
    item.addEventListener("click", function() {
      items.forEach(el => el.classList.remove("active"));
      this.classList.add("active");
      updateIndicator();
    });
  });
});
</script>
  </body>
  
</html>
